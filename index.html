<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrizeHunt AI</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
background:#1e293b;
padding:30px;
border-radius:10px;
width:350px;
margin:auto;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.result{
margin-top:20px;
text-align:left;
}
</style>
</head>

<body>

<h1>💰 PrizeHunt AI</h1>
<p>Find the best deal instantly</p>

<div class="container">

<input id="product" placeholder="Product name">
<input id="budget" placeholder="Budget ₹">
<input id="location" placeholder="Location">

<button onclick="searchPrice()">Compare Prices</button>

<div class="result" id="result"></div>

</div>

<script>

async function searchPrice(){

let product=document.getElementById("product").value;
let budget=document.getElementById("budget").value;
let location=document.getElementById("location").value;

let response=await fetch("/api/prizehunt",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
product:product,
budget:budget,
location:location
})
})

let data=await response.json();

let output="";

data.results.forEach(item=>{
output+=`
<div>
<h3>${item.name}</h3>
<p>Base Price: ₹${item.base_price}</p>
<p>Fees: ₹${item.fees}</p>
<p>Delivery: ${item.delivery}</p>
<p><b>Net Value: ₹${item.net_value}</b></p>
</div>
<hr>
`
})

output+=`<h3>Recommendation</h3>
<p>${data.recommendation}</p>`

document.getElementById("result").innerHTML=output;

}

</script>

</body>
</html>
